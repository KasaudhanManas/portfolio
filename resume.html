<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Resume — Manas Kasaudhan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
  .resume-box { background: var(--surface2); padding: 60px; border: 1px solid var(--border); border-radius: 4px; max-width: 600px; }
  h1 { font-family: 'Syne', sans-serif; font-size: 36px; margin-bottom: 24px; color: var(--white); }
  p { color: var(--muted); margin-bottom: 32px; font-size: 14px; line-height: 1.8; }
  .actions { display: flex; gap: 16px; justify-content: center; }
</style>
</head>
<body>
  <div id="cursor"></div>
  <div id="cursor-ring"></div>
  <div class="resume-box reveal visible">
    <h1>My Resume</h1>
    <p>Get a comprehensive overview of my experience, skills, and projects by downloading my official resume.</p>
    <div class="actions">
      <a href="resume.pdf" class="btn-primary" download>Download PDF</a>
      <a href="index.html" class="btn-outline">Back to Portfolio</a>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
