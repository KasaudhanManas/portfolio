<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WeatherScope Project</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
  body { padding: 60px; max-width: 900px; margin: 0 auto; }
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
  .icon { font-size: 64px; }
  h1 { font-family: 'Syne', sans-serif; font-size: 48px; color: var(--white); }
  .tag { display: inline-block; padding: 6px 14px; background: rgba(0,245,196,0.1); border: 1px solid rgba(0,245,196,0.3); border-radius: 100px; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 24px; }
  p { font-size: 16px; line-height: 1.8; color: var(--muted); margin-bottom: 40px; }
</style>
</head>
<body>
  <div class="header reveal visible">
    <div>
      <div class="tag">Real-time App</div>
      <h1>WeatherScope</h1>
    </div>
    <div class="icon">🌤</div>
  </div>
  <div class="reveal visible">
    <p>A real-time weather forecast platform with geolocation support and a MongoDB caching layer that reduced external API calls by 60%.</p>
    <div style="display:flex;gap:16px;">
      <a href="https://github.com/manaskasaudhan/weatherscope" target="_blank" class="btn-primary">View on GitHub</a>
      <a href="index.html#projects" class="btn-outline">Back to Projects</a>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
