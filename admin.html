<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Dashboard — Manas Kasaudhan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: var(--bg); }
  .admin-page-container { width: 100%; max-width: 600px; padding: 20px; }
  /* Inherits modal styles from style.css */
</style>
</head>
<body>
  <div id="cursor"></div>
  <div id="cursor-ring"></div>
  
  <div class="admin-page-container reveal visible">
    <div class="admin-modal" style="width:100%; max-width:100%;">
      <a href="index.html" class="admin-close" style="text-decoration:none;">✕</a>

      <div id="admin-login">
        <div class="admin-title">Admin Panel</div>
        <p class="admin-sub">Secure dashboard — JWT authenticated</p>
        <div class="form-group" style="margin-bottom:12px;">
          <label class="form-label">Username</label>
          <input class="form-input" type="text" id="admin-user" placeholder="admin" />
        </div>
        <div class="form-group" style="margin-bottom:24px;">
          <label class="form-label">Password</label>
          <input class="form-input" type="password" id="admin-pass" placeholder="••••••••" />
        </div>
        <button class="form-submit" style="width:100%" onclick="adminLogin()">Login →</button>
        <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:12px;">Demo: admin / admin123</div>
      </div>

      <div id="admin-dashboard" style="display:none;">
        <div class="admin-title">Dashboard</div>
        <p class="admin-sub">Manage your portfolio projects</p>

        <div class="admin-section-title">Projects</div>
        <div class="admin-project-list" id="admin-proj-list"></div>
        <button class="admin-btn success" style="width:100%;padding:12px;" onclick="adminAddProject()">+ Add New Project</button>

        <div class="admin-section-title" style="margin-top:24px;">Quick Stats</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div style="padding:16px;background:var(--bg);border:1px solid var(--border);border-radius:2px;text-align:center;">
            <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent)" id="stat-count">4</div>
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em">Projects</div>
          </div>
          <div style="padding:16px;background:var(--bg);border:1px solid var(--border);border-radius:2px;text-align:center;">
            <div style="font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:var(--accent2)">12</div>
            <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em">Messages</div>
          </div>
        </div>
        
        <div style="margin-top:24px; text-align:center;">
            <a href="index.html" class="btn-outline" style="font-size: 11px; padding: 10px 20px;">Return to Site</a>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
